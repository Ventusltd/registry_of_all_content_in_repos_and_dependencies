name: Build kernel registry

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'config/registry_repos.json'
      - 'scripts/build_registry.py'
      - 'scripts/build_registry_from_config.py'
      - 'scripts/reconcile_registry.py'
      - 'scripts/reconcile_registry_from_config.py'
      - 'scripts/build_graph_latest.py'
      - 'scripts/build_kernel.py'
      - 'scripts/validate_kernel_outputs.py'
      - '.github/workflows/registry.yml'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

concurrency:
  group: kernel-registry
  cancel-in-progress: false

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run registry builder or reconciler
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            python3 scripts/build_registry_from_config.py
          else
            python3 scripts/reconcile_registry_from_config.py
          fi
          python3 scripts/build_graph_latest.py
          python3 scripts/build_kernel.py
          python3 scripts/validate_kernel_outputs.py
      - name: Commit registry changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry
          if git diff --cached --quiet; then
            echo "No registry changes to commit"
            exit 0
          fi
          git commit -m "Update kernel registry"
          git push
